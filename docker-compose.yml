services:
  postgres:
    image: postgres:18.3-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:7802:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: snapshot_repro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d snapshot_repro"]
      interval: 1s
      timeout: 5s
      retries: 30
